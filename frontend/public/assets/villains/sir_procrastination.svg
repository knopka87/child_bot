<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect width="200" height="200" fill="#E8FFE8" rx="10"/>
  <!-- Clock -->
  <circle cx="100" cy="60" r="30" fill="#FFF" stroke="#2C3E50" stroke-width="3"/>
  <line x1="100" y1="60" x2="100" y2="45" stroke="#000" stroke-width="3"/>
  <line x1="100" y1="60" x2="115" y2="65" stroke="#E74C3C" stroke-width="2"/>
  <!-- Body - lazy figure -->
  <ellipse cx="100" cy="125" rx="40" ry="50" fill="#3498DB"/>
  <!-- Tired eyes -->
  <line x1="82" y1="105" x2="92" y2="105" stroke="#000" stroke-width="3"/>
  <line x1="108" y1="105" x2="118" y2="105" stroke="#000" stroke-width="3"/>
  <!-- Yawning mouth -->
  <ellipse cx="100" cy="120" rx="10" ry="6" fill="#000"/>
  <!-- Zzz -->
  <text x="135" y="85" font-size="14" fill="#3498DB" font-weight="bold">Z</text>
  <text x="145" y="75" font-size="18" fill="#3498DB" font-weight="bold">Z</text>
  <text x="155" y="63" font-size="22" fill="#3498DB" font-weight="bold">Z</text>
  <!-- Name -->
  <text x="100" y="185" font-size="11" fill="#3498DB" text-anchor="middle" font-weight="bold">Сэр Прокрастинация</text>
</svg>
