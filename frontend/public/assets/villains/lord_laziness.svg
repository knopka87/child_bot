<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect width="200" height="200" fill="#F0F0FF" rx="10"/>
  <!-- Couch -->
  <rect x="60" y="100" width="80" height="40" fill="#8E44AD" rx="5"/>
  <rect x="55" y="95" width="90" height="10" fill="#9B59B6" rx="3"/>
  <!-- Lazy figure on couch -->
  <ellipse cx="100" cy="85" rx="30" ry="25" fill="#34495E"/>
  <!-- Head -->
  <circle cx="100" cy="65" r="18" fill="#FFE0BD"/>
  <!-- Sleepy eyes -->
  <path d="M 90 62 Q 93 65 96 62" stroke="#000" stroke-width="2" fill="none"/>
  <path d="M 104 62 Q 107 65 110 62" stroke="#000" stroke-width="2" fill="none"/>
  <!-- Snoring -->
  <text x="125" y="55" font-size="12" fill="#34495E" font-weight="bold">💤</text>
  <!-- Remote control -->
  <rect x="140" y="115" width="15" height="25" fill="#2C3E50" rx="2"/>
  <!-- TV -->
  <rect x="20" y="110" width="30" height="20" fill="#3498DB" rx="2"/>
  <!-- Name -->
  <text x="100" y="170" font-size="12" fill="#8E44AD" text-anchor="middle" font-weight="bold">Лорд Лень</text>
</svg>
