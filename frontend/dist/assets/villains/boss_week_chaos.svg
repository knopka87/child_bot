<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect width="200" height="200" fill="#2C3E50" rx="10"/>
  <!-- Lightning bolts -->
  <polygon points="30,30 40,50 35,50 45,70 38,55 45,55" fill="#F1C40F"/>
  <polygon points="170,30 160,50 165,50 155,70 162,55 155,55" fill="#F1C40F"/>
  <!-- Crown - bigger and more ornate -->
  <polygon points="60,40 75,15 90,35 100,10 110,35 125,15 140,40" fill="#F1C40F" stroke="#E67E22" stroke-width="2"/>
  <circle cx="75" cy="20" r="4" fill="#E74C3C"/>
  <circle cx="100" cy="15" r="4" fill="#3498DB"/>
  <circle cx="125" cy="20" r="4" fill="#2ECC71"/>
  <!-- Body - larger and more menacing -->
  <ellipse cx="100" cy="110" rx="50" ry="60" fill="#E74C3C"/>
  <!-- Cape -->
  <path d="M 50 80 Q 100 60 150 80 L 140 160 Q 100 170 60 160 Z" fill="#C0392B"/>
  <!-- Eyes - glowing red -->
  <circle cx="80" cy="85" r="10" fill="#FFF"/>
  <circle cx="120" cy="85" r="10" fill="#FFF"/>
  <circle cx="80" cy="85" r="6" fill="#E74C3C"/>
  <circle cx="120" cy="85" r="6" fill="#E74C3C"/>
  <circle cx="80" cy="85" r="3" fill="#000"/>
  <circle cx="120" cy="85" r="3" fill="#000"/>
  <!-- Evil grin -->
  <path d="M 75 110 Q 100 130 125 110" stroke="#FFF" stroke-width="4" fill="none"/>
  <!-- Chaos symbols -->
  <text x="45" y="130" font-size="16" fill="#F1C40F">⚡</text>
  <text x="140" y="140" font-size="18" fill="#F1C40F">⚡</text>
  <!-- Name -->
  <text x="100" y="190" font-size="11" fill="#F1C40F" text-anchor="middle" font-weight="bold">БОСС: Хаос Недели</text>
</svg>
