services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: child_bot_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-child_bot}
      POSTGRES_USER: ${POSTGRES_USER:-child_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - child_bot_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-child_bot}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: child_bot_redis_dev
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-dev_redis_secret}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - child_bot_network
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD:-dev_redis_secret}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Backend API (Go) - Development mode with hot reload
  backend:
    build:
      context: ..
      dockerfile: Dockerfile
      # target: build  # Убрано - используем финальную стадию для entrypoint.sh
    container_name: child_bot_backend_dev
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      # Database
      DATABASE_URL: postgres://${POSTGRES_USER:-child_bot}:${POSTGRES_PASSWORD:-dev_secret}@postgres:5432/${POSTGRES_DB:-child_bot}?sslmode=disable

      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-dev_redis_secret}@redis:6379/0

      # App
      PORT: 8080
      ENV: development
      LOG_LEVEL: debug

      # LLM
      DEFAULT_LLM: ${DEFAULT_LLM:-gpt}
      LLM_SERVER_URL: ${LLM_SERVER_URL:-http://138.124.55.145:8000}

      # CORS берется из .env файла через env_file выше

      # Migrations
      MIGRATIONS_DIR: /app/migrations
    volumes:
      # Hot reload для разработки
      - ../api:/src/api:ro
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - child_bot_network
    # Используем entrypoint.sh для автоматического применения миграций
    # command: ["/out/server"]  # Закомментировано - переопределяло ENTRYPOINT

  # Frontend (Vite dev server)
  frontend:
    image: node:20-alpine
    container_name: child_bot_frontend_dev
    working_dir: /app
    environment:
      VITE_API_BASE_URL: http://localhost:8080
      VITE_APP_VERSION: dev
    volumes:
      - ../frontend:/app
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:3000"
    depends_on:
      - backend
    networks:
      - child_bot_network
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

networks:
  child_bot_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
