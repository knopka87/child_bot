services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: child_bot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-child_bot}
      POSTGRES_USER: ${POSTGRES_USER:-child_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - child_bot_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-child_bot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: child_bot_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - child_bot_network
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (Go)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: child_bot_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Database
      DATABASE_URL: postgres://${POSTGRES_USER:-child_bot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-child_bot}?sslmode=disable

      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0

      # App
      PORT: 8080
      ENV: ${ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}

      # LLM Service
      LLM_SERVER_URL: ${LLM_SERVER_URL}
      DEFAULT_LLM: ${DEFAULT_LLM:-gpt}

      # Migrations
      MIGRATIONS_DIR: /app/migrations
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - child_bot_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend (Nginx with built static files)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
        VITE_APP_VERSION: ${VITE_APP_VERSION:-1.0.0}
        VITE_ANALYTICS_ENABLED: ${VITE_ANALYTICS_ENABLED:-true}
    container_name: child_bot_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - child_bot_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  child_bot_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local